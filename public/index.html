<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Dog Cam — Viewer</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dog Cam" />
  <meta name="theme-color" content="#000000" />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #000; color: #f2f2f2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
    }
    body { display: flex; flex-direction: column; }
    header {
      padding: 14px 18px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid #1c1c1e; flex: 0 0 auto;
    }
    header h1 { font-size: 17px; font-weight: 600; margin: 0; flex: 1; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%; background: #555; flex: 0 0 auto;
    }
    .dot.live { background: #30d158; animation: pulse 1.8s infinite; }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(48,209,88,0.5); }
      70%  { box-shadow: 0 0 0 10px rgba(48,209,88,0); }
      100% { box-shadow: 0 0 0 0 rgba(48,209,88,0); }
    }
    .stage { flex: 1; position: relative; background: #000; }
    video {
      width: 100%; height: 100%; object-fit: contain; background: #000;
      display: block;
    }
    .overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      text-align: center; padding: 24px; pointer-events: none;
    }
    .overlay p { color: #9b9b9d; font-size: 15px; max-width: 320px; line-height: 1.5; }
    .spinner {
      width: 34px; height: 34px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.18); border-top-color: #0a84ff;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tap {
      position: absolute; inset: 0; display: flex; align-items: center;
      justify-content: center; background: rgba(0,0,0,0.6); cursor: pointer;
    }
    .tap button {
      appearance: none; border: none; border-radius: 14px;
      background: #0a84ff; color: #fff; font-size: 16px; font-weight: 600;
      padding: 14px 26px;
    }
    .statusbar {
      position: absolute; top: 0; left: 0; right: 0; padding: 10px 18px;
      font-size: 13px; color: #d0d0d0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
      pointer-events: none;
    }
    .bark-alert {
      position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(255,69,58,0.92); color: #fff;
      border-radius: 14px; padding: 10px 22px;
      font-size: 15px; font-weight: 600; white-space: nowrap;
      pointer-events: none; opacity: 0; transition: opacity 0.2s;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .bark-alert.show { opacity: 1; }
    .header-btns { display: flex; gap: 8px; }
    .icon-btn {
      appearance: none; border: none; border-radius: 10px;
      background: rgba(255,255,255,0.12); color: #fff;
      font-size: 18px; line-height: 1; padding: 7px 10px; cursor: pointer;
    }
    .icon-btn:active { opacity: 0.6; }
    .icon-btn.active { background: rgba(10,132,255,0.35); }
    .hidden { display: none !important; }
    .err { color: #ff453a; font-size: 14px; max-width: 320px; }
  </style>
</head>
<body>
  <header>
    <span id="statusDot" class="dot"></span>
    <h1>Dog Cam · Live</h1>
    <div class="header-btns">
      <button class="icon-btn" id="alertBtn" title="Bark alerts" aria-label="Toggle bark alerts">🔔</button>
      <button class="icon-btn hidden" id="pipBtn" title="Picture in Picture" aria-label="Picture in Picture">⧉</button>
    </div>
  </header>

  <div class="stage">
    <video id="remote" autoplay playsinline></video>

    <div class="statusbar" id="statusbar">Connecting…</div>

    <div class="overlay" id="waitOverlay">
      <div class="spinner"></div>
      <p id="waitText">Connecting to the camera…</p>
      <div id="errText" class="err"></div>
    </div>

    <div class="tap hidden" id="tapOverlay">
      <button>Tap to start audio</button>
    </div>

    <div class="bark-alert" id="barkAlert">🐶 Bark detected!</div>
  </div>

  <script>
  (function () {
    'use strict';

    let RTC_CONFIG = {
      iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
    };
    const params = new URLSearchParams(location.search);
    // Persist the secret in localStorage so home-screen PWA launches work
    // without a ?secret= in the URL (manifest start_url is always bare "/").
    const urlSecret = params.get('secret');
    if (urlSecret) localStorage.setItem('dogcam_secret', urlSecret);
    const secret = urlSecret || localStorage.getItem('dogcam_secret') || '';

    async function loadIceConfig() {
      try {
        const res = await fetch('/ice-config?secret=' + encodeURIComponent(secret));
        if (res.ok) {
          const data = await res.json();
          if (data && Array.isArray(data.iceServers) && data.iceServers.length) {
            RTC_CONFIG = { iceServers: data.iceServers };
          }
        }
      } catch (_e) {}
    }

    let ws = null;
    let myId = null;
    let pc = null;
    let cameraId = null;
    const pendingCandidates = [];
    let alertsEnabled = true;
    let swReg = null;

    const remote = document.getElementById('remote');
    const statusDot = document.getElementById('statusDot');
    const statusbar = document.getElementById('statusbar');
    const waitOverlay = document.getElementById('waitOverlay');
    const waitText = document.getElementById('waitText');
    const errText = document.getElementById('errText');
    const tapOverlay = document.getElementById('tapOverlay');
    const barkAlert = document.getElementById('barkAlert');
    const alertBtn = document.getElementById('alertBtn');
    const pipBtn = document.getElementById('pipBtn');

    function setStatus(text, live) {
      statusbar.textContent = text;
      statusDot.classList.toggle('live', !!live);
    }
    function signal(obj) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(obj));
    }

    // ---- Service Worker + Notifications -----------------------------------
    async function setupServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      try {
        swReg = await navigator.serviceWorker.register('/sw.js');
        await navigator.serviceWorker.ready;
      } catch (_e) { swReg = null; }
    }

    async function requestNotifPermission() {
      if (!('Notification' in window)) return false;
      if (Notification.permission === 'granted') return true;
      if (Notification.permission === 'denied') return false;
      const result = await Notification.requestPermission();
      return result === 'granted';
    }

    function sendNotification(title, body, tag) {
      if (!alertsEnabled) return;
      if (!('Notification' in window) || Notification.permission !== 'granted') return;
      // SW path works in background; direct Notification works in foreground.
      const sw = swReg && (swReg.active || swReg.waiting || swReg.installing);
      if (sw) {
        sw.postMessage({ type: 'notify', title, body, tag });
      } else {
        try { new Notification(title, { body, tag }); } catch (_e) {}
      }
    }

    // Sync alert button visual state.
    function syncAlertBtn() {
      const granted = 'Notification' in window && Notification.permission === 'granted';
      alertBtn.textContent = (alertsEnabled && granted) ? '🔔' : '🔕';
      alertBtn.classList.toggle('active', alertsEnabled && granted);
    }

    alertBtn.addEventListener('click', async () => {
      if (!alertsEnabled) {
        const granted = await requestNotifPermission();
        if (granted) { alertsEnabled = true; }
      } else {
        alertsEnabled = false;
      }
      syncAlertBtn();
    });

    // ---- Bark detection ---------------------------------------------------
    let audioCtx = null;
    let analyser = null;
    let barkCooldown = false;
    let barkTimer = null;
    let rafId = null;

    function startBarkDetection(stream) {
      if (audioCtx) return;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const src = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.3;
        src.connect(analyser);
        const data = new Uint8Array(analyser.frequencyBinCount);

        function tick() {
          if (!analyser) return;
          analyser.getByteFrequencyData(data);
          let sum = 0;
          for (let i = 0; i < data.length; i++) sum += (data[i] / 255) ** 2;
          const rms = Math.sqrt(sum / data.length);
          if (rms > 0.18 && !barkCooldown) {
            barkCooldown = true;
            // On-screen alert always shows regardless of notification permission.
            barkAlert.classList.add('show');
            clearTimeout(barkTimer);
            barkTimer = setTimeout(() => barkAlert.classList.remove('show'), 2500);
            sendNotification('🐶 Dog Cam', 'Your dog is barking!', 'bark');
            setTimeout(() => { barkCooldown = false; }, 4000);
          }
          rafId = requestAnimationFrame(tick);
        }
        tick();
      } catch (_e) {}
    }

    function stopBarkDetection() {
      if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
      analyser = null;
      if (audioCtx) { try { audioCtx.close(); } catch (_e) {} audioCtx = null; }
    }

    // ---- Picture-in-Picture ----------------------------------------------
    function setupPip() {
      const hasPip = !!document.pictureInPictureEnabled;
      // iOS Safari uses a webkit-prefixed API on video elements.
      const hasWebkitPip = typeof remote.webkitSupportsPresentationMode === 'function'
        && remote.webkitSupportsPresentationMode('picture-in-picture');

      if (!hasPip && !hasWebkitPip) return;

      pipBtn.classList.remove('hidden');

      pipBtn.addEventListener('click', async () => {
        try {
          if (hasPip) {
            if (document.pictureInPictureElement) {
              await document.exitPictureInPicture();
            } else {
              await remote.requestPictureInPicture();
            }
          } else if (hasWebkitPip) {
            const next = remote.webkitPresentationMode === 'picture-in-picture'
              ? 'inline' : 'picture-in-picture';
            remote.webkitSetPresentationMode(next);
          }
        } catch (_e) {}
      });

      remote.addEventListener('enterpictureinpicture', () => {
        pipBtn.classList.add('active'); pipBtn.textContent = '⊡';
      });
      remote.addEventListener('leavepictureinpicture', () => {
        pipBtn.classList.remove('active'); pipBtn.textContent = '⧉';
      });
      remote.addEventListener('webkitpresentationmodechanged', () => {
        const inPip = remote.webkitPresentationMode === 'picture-in-picture';
        pipBtn.classList.toggle('active', inPip);
        pipBtn.textContent = inPip ? '⊡' : '⧉';
      });
    }

    // ---- Peer connection --------------------------------------------------
    function closePeer() {
      stopBarkDetection();
      if (pc) {
        try { pc.ontrack = pc.onicecandidate = pc.onconnectionstatechange = null; } catch (_e) {}
        try { pc.close(); } catch (_e) {}
        pc = null;
      }
      cameraId = null;
      pendingCandidates.length = 0;
      remote.srcObject = null;
    }

    async function handleOffer(fromId, sdp) {
      const wasLive = !!remote.srcObject;
      closePeer();
      cameraId = fromId;
      pc = new RTCPeerConnection(RTC_CONFIG);

      pc.ontrack = (event) => {
        const stream = event.streams && event.streams[0];
        if (stream) {
          remote.srcObject = stream;
          startBarkDetection(stream);
        } else {
          let s = remote.srcObject;
          if (!s) { s = new MediaStream(); remote.srcObject = s; }
          s.addTrack(event.track);
          if (remote.srcObject) startBarkDetection(remote.srcObject);
        }
        waitOverlay.classList.add('hidden');
        setStatus('Live', true);
        tryPlay();
        sendNotification('Dog Cam', 'Camera connected — watching your dog 🐶', 'session-start');
      };

      pc.onicecandidate = (event) => {
        if (event.candidate) signal({ type: 'ice-candidate', targetId: cameraId, candidate: event.candidate });
      };

      pc.onconnectionstatechange = () => {
        if (['failed', 'closed', 'disconnected'].includes(pc.connectionState)) {
          setStatus('Camera connection lost', false);
          waitOverlay.classList.remove('hidden');
          waitText.textContent = 'Reconnecting to the camera…';
        }
      };

      await pc.setRemoteDescription(new RTCSessionDescription(sdp));
      for (const c of pendingCandidates) {
        try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch (_e) {}
      }
      pendingCandidates.length = 0;

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      signal({ type: 'answer', targetId: cameraId, sdp: pc.localDescription });
    }

    function tryPlay() {
      const p = remote.play();
      if (p && typeof p.catch === 'function') {
        p.catch(() => { tapOverlay.classList.remove('hidden'); });
      }
    }

    tapOverlay.addEventListener('click', () => {
      tapOverlay.classList.add('hidden');
      remote.play().catch(() => {});
      // iOS suspends AudioContext before user gesture; resume it now.
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    });

    // ---- WebSocket --------------------------------------------------------
    function connectSocket() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/?secret=${encodeURIComponent(secret)}`);

      ws.onopen = () => {
        setStatus('Waiting for camera…', false);
        signal({ type: 'viewer-joined' });
      };

      ws.onclose = (event) => {
        setStatus(`Disconnected (code ${event.code}${event.reason ? ': ' + event.reason : ''})`, false);
        closePeer();
        setTimeout(connectSocket, 2000);
      };

      ws.onerror = () => setStatus('Connection error', false);

      ws.onmessage = async (event) => {
        let msg;
        try { msg = JSON.parse(event.data); } catch (_e) { return; }

        switch (msg.type) {
          case 'welcome':
            myId = msg.id;
            break;

          case 'offer':
            await handleOffer(msg.from, msg.sdp);
            break;

          case 'ice-candidate':
            if (!msg.candidate) return;
            if (pc && pc.remoteDescription && pc.remoteDescription.type) {
              try { await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch (_e) {}
            } else {
              pendingCandidates.push(msg.candidate);
            }
            break;

          case 'peer-left':
            if (msg.from === cameraId) {
              const wasLive = !!remote.srcObject;
              closePeer();
              setStatus('Camera offline', false);
              waitOverlay.classList.remove('hidden');
              waitText.textContent = 'Camera is offline. Waiting…';
              signal({ type: 'viewer-joined' });
              if (wasLive) {
                sendNotification('Dog Cam', 'Camera disconnected — session ended', 'session-end');
              }
            }
            break;
        }
      };
    }

    window.addEventListener('pagehide', () => {
      closePeer();
      if (ws) try { ws.close(); } catch (_e) {}
    });

    // ---- Init -------------------------------------------------------------
    if (!secret) {
      waitOverlay.classList.remove('hidden');
      waitText.textContent = '';
      errText.textContent = 'Open the link with ?secret= once to save it, then the app will work from your home screen.';
    } else {
      setupPip();
      setupServiceWorker().then(() => {
        syncAlertBtn();
        // Auto-request on load if not yet decided, so alerts work immediately.
        if ('Notification' in window && Notification.permission === 'default') {
          requestNotifPermission().then(syncAlertBtn);
        }
      });
      loadIceConfig().then(connectSocket);
    }
  })();
  </script>
</body>
</html>
